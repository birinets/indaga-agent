name: ci

on:
  push:
    branches: ["**"]
  pull_request:

# least-privilege token (read-only); CI does not write to the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (locked)
        # --locked fails if uv.lock is out of date with pyproject.toml — reproducible installs.
        run: uv sync --locked --extra dev --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Unit tests
        # warnings-as-errors is enforced via [tool.pytest.ini_options] filterwarnings = ["error", ...].
        # integration tests (built subject + the 3 GB reference DB) are excluded — they run locally.
        run: uv run pytest -q -m "not integration"
